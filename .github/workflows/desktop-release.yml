name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify
        run: npm run verify

      - name: Build NSIS installer
        run: npm run package

      - name: Generate SHA-256
        shell: pwsh
        run: |
          $installer = Get-ChildItem -LiteralPath release -Filter "PDF2ZH-Desktop-Setup-*.exe" | Select-Object -First 1
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -LiteralPath "release/$($installer.Name).sha256" -Encoding utf8NoBOM

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf2zh-desktop-windows-x64
          path: |
            desktop/release/PDF2ZH-Desktop-Setup-*.exe
            desktop/release/PDF2ZH-Desktop-Setup-*.exe.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Windows 10/11 x64 联网安装版。首次启动会下载并校验固定版本的 PDF2ZH Next 运行时。

            当前安装包未进行商业代码签名，Windows SmartScreen 可能显示未知发布者。请使用随附的 SHA-256 文件核对完整性。
          files: |
            desktop/release/PDF2ZH-Desktop-Setup-*.exe
            desktop/release/PDF2ZH-Desktop-Setup-*.exe.sha256
