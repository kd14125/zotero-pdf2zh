name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify
        run: npm run verify

      - name: Build NSIS installer
        run: npm run package

      - name: Generate SHA-256
        shell: pwsh
        run: |
          $installer = Get-ChildItem -LiteralPath release -Filter "PDF2ZH-Desktop-Setup-*.exe" | Select-Object -First 1
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -LiteralPath "release/$($installer.Name).sha256" -Encoding utf8NoBOM

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf2zh-desktop-windows-x64
          path: |
            desktop/release/PDF2ZH-Desktop-Setup-*.exe
            desktop/release/PDF2ZH-Desktop-Setup-*.exe.sha256
            desktop/release/PDF2ZH-Desktop-Setup-*.exe.blockmap
            desktop/release/latest.yml

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            # PDF2ZH Desktop

            无需安装 Zotero、Python、uv 或 conda 的 Windows PDF 翻译桌面客户端。

            ## v0.4.0 更新内容

            - **复杂行内公式矢量重绘**：MinerU 提供公式位置和 LaTeX，包含分式、积分、求和等结构的复杂行内公式会作为不可拆分单元参与 BabelDOC 排版，减少公式拆散、残片和正文遮挡。
            - **内置 MathJax 4**：默认在本机离线生成矢量 SVG/PDF，不需要安装 Node.js、LaTeX 或其他公式工具。
            - **可选本机 LaTeX**：设置页可检测 `pdflatex`，缺失时可通过 `winget` 安装 MiKTeX；编译使用 `-no-shell-escape` 并拒绝文件读写等危险命令。
            - **逐公式回退**：MathJax 无法处理特殊宏时，如果检测到本机 LaTeX，可只对失败公式回退，不影响其他公式。
            - **行间公式兼容**：继续使用 MinerU 坐标补充 PDF2ZH 漏检的行间公式，不让 MinerU 接管正文翻译或整页布局。
            - **设置与历史任务**：新增公式渲染器选择、LaTeX 检测和安装状态；已有任务仍可从历史找到原始 PDF，按原配置生成 `.mineru-formula.pdf`，不覆盖旧结果。
            - **真实论文验证**：完成关闭/开启 MinerU 的同参数 A/B 测试，并验证单语、左右双语和上下对照输出。

            > 隐私与费用提示：启用后原始 PDF 会上传到 MinerU，可能消耗 MinerU 配额并增加处理时间；从历史重新生成也可能再次调用翻译 API。MathJax 和可选 LaTeX 渲染均在本机执行。普通文档或公式已经正常时可以保持关闭。

            ## 下载与安装

            **普通用户只需在 Assets 中下载 `PDF2ZH-Desktop-Setup-版本号.exe`，然后双击安装。**

            - `.sha256` 是供高级用户手动校验安装包完整性使用的可选文件，不需要下载也不影响安装和运行。
            - `Source code` 是 GitHub 自动生成的源码压缩包，不是 Windows 安装包。
            - 安装包适用于 Windows 10/11 x64。

            ## 首次启动

            首次启动后，软件会通过图形界面下载、校验并解压固定版本的 PDF2ZH Next 运行时。该运行时约 630 MiB，只需准备一次，不需要在浏览器中手动下载。

            运行时准备完成后，在“设置”页面配置翻译服务，然后即可拖入 PDF 开始翻译。SiliconFlowFree 无需 API Key，可用于快速体验。

            ## Windows 安全提示

            当前安装包未进行商业代码签名，Windows SmartScreen 可能显示“未知发布者”。请确认安装包来自本仓库 Release。需要额外验证文件完整性的用户，可使用随附的 `.sha256` 文件。

            ## 应用内更新

            从支持自动更新的版本开始，可在“设置”页面点击“检查更新”，发现新版本后直接下载并重启安装。`latest.yml` 和 `.blockmap` 是应用自动更新所需的元数据，普通用户不需要手动下载。

            ## 项目来源

            本项目 fork 自 [guaguastandup/zotero-pdf2zh](https://github.com/guaguastandup/zotero-pdf2zh)，PDF2ZH Desktop 是独立衍生版本，并非上游作者发布或维护的官方桌面客户端。
          files: |
            desktop/release/PDF2ZH-Desktop-Setup-*.exe
            desktop/release/PDF2ZH-Desktop-Setup-*.exe.sha256
            desktop/release/PDF2ZH-Desktop-Setup-*.exe.blockmap
            desktop/release/latest.yml
